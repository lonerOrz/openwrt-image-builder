name: Build daede image

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 选择目标设备配置
        required: true
        default: "friendlyarm_nanopi-r2s"
        type: choice
        options:
          - "friendlyarm_nanopi-r2s"
          - "x86_64"
      publish_release:
        description: 把生成的固件发布到 GitHub Release
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      preflight:
        description: 构建前运行依赖预检
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison gawk gettext git \
            libncurses-dev libssl-dev python3 python3-distutils \
            rsync unzip zstd file wget curl jq qemu-utils genisoimage

      - name: Build image
        env:
          PREFLIGHT: ${{ inputs.preflight }}
          OUT_DIR: ${{ github.workspace }}/out
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/*.sh scripts/lib/*.sh
          scripts/build.sh "config/profiles/${{ inputs.profile }}.json"

      - name: Set artifact name
        id: artifact
        run: |
          EXTRA_NAME=$(jq -r '.extra_image_name' "config/profiles/${{ inputs.profile }}.json")
          echo "name=daede-${EXTRA_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: out/*
          if-no-files-found: error

      - name: Publish release
        if: inputs.publish_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: daede-${{ inputs.profile }}-${{ github.run_number }}
          name: daede ${{ inputs.profile }} 固件 ${{ github.run_number }}
          artifacts: out/*
          allowUpdates: true
          replacesArtifacts: true
